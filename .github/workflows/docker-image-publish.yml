name: Frontend Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{secrets.DOCKERHUB_TOKEN}}" | docker login -u "${{secrets.DOCKERHUB_USER}}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" \
            --file Dockerfile \
            --tag "${{ secrets.DOCKERHUB_USER }}/university-management-frontend:latest" \
            .

      - name: Push Docker Image
        run: docker push "${{secrets.DOCKERHUB_USER}}"/university-management-frontend:latest
